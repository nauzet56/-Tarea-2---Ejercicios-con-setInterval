<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="parpadeo">Esto parpadea</p>
    
    <button onclick="iniciar()">Iniciar</button>
    <button onclick="detener()">Detener</button>

    <script>
        let visible = true;
        let intervalo = null;
        const parrafo = document.getElementById("parpadeo");

        function iniciar() {
    
            if (intervalo !== null) {
                clearInterval(intervalo);
            }

            intervalo = setInterval(function() {
    
                visible = !visible;

                if (visible) {
                    parrafo.style.visibility = "visible";
                } else {
                    parrafo.style.visibility = "hidden";
                }
            }, 500);
        }

        function detener() {
            clearInterval(intervalo);
            intervalo = null;
            
            parrafo.style.visibility = "visible";
            visible = true;
        }
    </script>
</body>
</html>
